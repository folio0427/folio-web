name: Prerender legal pages

# Inlines legal markdown into terms.html / privacy.html for SEO.
# Triggers on push to legal/*.md or the prerender script.

on:
  push:
    branches: [main]
    paths:
      - 'legal/**/*.md'
      - 'scripts/prerender-legal.mjs'
      - '.github/workflows/prerender-legal.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerender:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marked
        run: npm install marked --no-save

      - name: Run prerender script
        run: node scripts/prerender-legal.mjs

      - name: Commit prerendered HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terms.html privacy.html
          if git diff --cached --quiet; then
            echo "No prerender changes — skipping commit."
          else
            git commit -m "chore(legal): prerender markdown to HTML [skip ci]"
            git push
          fi
